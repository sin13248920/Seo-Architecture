<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Studio | 메인</title>
    <!-- 미니멀하고 세련된 폰트 적용 (구글 폰트 Noto Sans KR & Montserrat) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 기본 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* 헤더/푸터가 삽입될 공간 확보 및 기본 스타일 */
        #header-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        /* 메인 비주얼 슬라이더 영역 (해안건축 특유의 풀스크린 레이아웃) */
        .main-visual {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 10%;
        }

        .slide.active {
            opacity: 1;
        }

        /* 어두운 오버레이로 글씨 가독성 확보 */
        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* 슬라이드 텍스트 스타일 */
        .slide-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            transform: translateY(30px);
            transition: transform 1.2s ease-in-out;
        }

        .slide.active .slide-content {
            transform: translateY(0);
        }

        .slide-content .category {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 15px;
            display: block;
        }

        .slide-content h2 {
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 25px;
            word-break: keep-all;
        }

        .slide-content .view-more {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #fff;
            padding-bottom: 5px;
            transition: color 0.3s, border-color 0.3s;
        }

        .slide-content .view-more:hover {
            color: #ccc;
            border-color: #ccc;
        }

        /* 슬라이드 인디케이터 (우측 하단 네비게이션 바) */
        .slider-controls {
            position: absolute;
            bottom: 50px;
            right: 10%;
            z-index: 10;
            display: flex;
            gap: 15px;
        }

        .control-btn {
            width: 40px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .control-btn.active {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <!-- 분리된 header.html이 들어올 자리 -->
    <div id="header-container"></div>

    <!-- 메인 콘텐츠 영역 -->
    <main class="main-visual">
        <div class="slide-container">
            <!-- 슬라이드 1 (이미지 주소는 작업 시 실제 건축물 이미지로 교체하세요) -->
            <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');">
                <div class="slide-content">
                    <span class="category">Culture & Public</span>
                    <h2>도시의 경계를 허무는<br>새로운 문화 네트워킹 공간</h2>
                    <a href="#" class="view-more">View Project</a>
                </div>
            </div>

            <!-- 슬라이드 2 -->
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1920&q=80');">
                <div class="slide-content">
                    <span class="category">Residential</span>
                    <h2>자연과 삶이 조화를 이루는<br>프리미엄 주거 단지 설계</h2>
                    <a href="#" class="view-more">View Project</a>
                </div>
            </div>

            <!-- 슬라이드 3 -->
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1920&q=80');">
                <div class="slide-content">
                    <span class="category">Corporate Office</span>
                    <h2>지속 가능한 미래를 위한<br>친환경 인텔리전트 타워</h2>
                    <a href="#" class="view-more">View Project</a>
                </div>
            </div>
        </div>

        <!-- 인디케이터 바 -->
        <div class="slider-controls">
            <div class="control-btn active" onclick="currentSlide(0)"></div>
            <div class="control-btn" onclick="currentSlide(1)"></div>
            <div class="control-btn" onclick="currentSlide(2)"></div>
        </div>
    </main>

    <!-- 분리된 footer.html이 들어올 자리 -->
    <div id="footer-container"></div>


    <!-- 스크립트: 헤더/푸터 로드 및 슬라이더 제어 -->
    <script>
        // 1. 컴포넌트(Header, Footer) 파일 로드 함수
        // 깃허브 페이지 환경에서 완벽하게 작동하도록 Vanilla JS fetch를 사용합니다.
        function loadComponent(elementId, filePath) {
            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('파일을 찾을 수 없습니다.');
                    return response.text();
                })
                .then(data => {
                    document.getElementById(elementId).innerHTML = data;
                })
                .catch(error => console.error('에러 발생:', error));
        }

        // 페이지 로드 시 헤더와 푸터 불러오기
        window.addEventListener('DOMContentLoaded', () => {
            loadComponent('header-container', 'header.html');
            loadComponent('footer-container', 'footer.html');
        });

        // 2. 메인 비주얼 슬라이더 기능
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.control-btn');
        const totalSlides = slides.length;

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentIdx = index;
        }

        function nextSlide() {
            let nextIdx = (currentIdx + 1) % totalSlides;
            showSlide(nextIdx);
        }

        function currentSlide(index) {
            showSlide(index);
            clearInterval(slideInterval); // 수동 조작 시 타이머 초기화 후 재시작
            slideInterval = setInterval(nextSlide, 5000);
        }

        // 5초마다 자동으로 슬라이드 전환
        let slideInterval = setInterval(nextSlide, 5000);
    </script>
</body>
</html>

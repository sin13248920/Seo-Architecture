<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architecture Studio | 메인</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Times New Roman", Times, serif;
    background-color: #000;
    color: #fff;
    overflow-x: hidden;
}

/* HEADER */
#header-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
}

/* MAIN */
.main-visual {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}

.slide-container {
    width: 100%;
    height: 100%;
    position: relative;
}

/* 🔥 핵심 수정: 중앙 정렬 */
.slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: block;
    text-decoration: none;
    color: inherit;

    opacity: 0;
    transition: opacity 1.2s ease-in-out;

    background-size: cover;
    background-position: center;

    padding: 0 10%;

    display: flex;
    align-items: center; /* ← 핵심 */
}

.slide.active {
    opacity: 1;
}

.slide::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 1;
}

/* 🔥 여기 중요 */
.slide-content {
    position: relative;
    z-index: 2;
    max-width: 800px;

    transform: translateY(0); /* ← 기존 위로 밀던 효과 제거 */
}

.category {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 15px;
    display: block;
}

h2 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 25px;
}

.view-more {
    display: inline-block;
    color: #fff;
    font-size: 13px;
    letter-spacing: 2px;
    border-bottom: 1px solid #fff;
    padding-bottom: 5px;
}

/* CONTROLS */
.slider-controls {
    position: absolute;
    bottom: 50px;
    right: 10%;
    z-index: 10;
    display: flex;
    gap: 15px;
}

.control-btn {
    width: 40px;
    height: 2px;
    background-color: rgba(255,255,255,0.3);
    cursor: pointer;
}

.control-btn.active {
    background-color: #fff;
}
</style>
</head>

<body>

<div id="header-container"></div>

<main class="main-visual">
<div class="slide-container">

    <a class="slide active" href="projects/00001.html"
       style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');">
        <div class="slide-content">
            <span class="category">2025년, 서울시 서오동</span>
            <h2>서오그룹<br>신사옥</h2>
            <span class="view-more">View Project</span>
        </div>
    </a>

    <a class="slide" href="projects/00004.html"
       style="background-image:url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1920&q=80');">
        <div class="slide-content">
            <span class="category">2026년, 서울시 서오동</span>
            <h2>e편한세상<br>서오 포레스타</h2>
            <span class="view-more">View Project</span>
        </div>
    </a>

    <a class="slide" href="projects/00005.html"
       style="background-image:url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1920&q=80');">
        <div class="slide-content">
            <span class="category">2026년, 서울시 서광동</span>
            <h2>서오출판사<br>신사옥</h2>
            <span class="view-more">View Project</span>
        </div>
    </a>

</div>

<div class="slider-controls">
    <div class="control-btn active" onclick="currentSlide(0)"></div>
    <div class="control-btn" onclick="currentSlide(1)"></div>
    <div class="control-btn" onclick="currentSlide(2)"></div>
</div>
</main>

<div id="footer-container"></div>

<script>
function loadComponent(id, file) {
    fetch(file)
        .then(res => res.text())
        .then(data => document.getElementById(id).innerHTML = data);
}

window.addEventListener('DOMContentLoaded', () => {
    loadComponent('header-container', 'header.html');
    loadComponent('footer-container', 'footer.html');
});

let currentIdx = 0;
const slides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.control-btn');
const totalSlides = slides.length;

function showSlide(index) {
    slides.forEach(s => s.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));

    slides[index].classList.add('active');
    dots[index].classList.add('active');

    currentIdx = index;
}

function nextSlide() {
    showSlide((currentIdx + 1) % totalSlides);
}

function currentSlide(index) {
    showSlide(index);
    clearInterval(slideInterval);
    slideInterval = setInterval(nextSlide, 5000);
}

let slideInterval = setInterval(nextSlide, 5000);
</script>

</body>
</html>

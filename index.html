<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서오건축</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Times New Roman", Times, serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* =========================
   HEADER
========================= */
#header-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
}

/* =========================
   MAIN VISUAL
========================= */
.main-visual {
    position: relative;
    width: 100%;
    height: 100vh;
}

/* SLIDES */
.slide-container {
    width: 100%;
    height: 100%;
    position: relative;
}

.slide {
    position: absolute;
    inset: 0;

    display: flex;
    align-items: center;
    padding: 0 10%;

    opacity: 0;
    transition: opacity 1.2s ease;

    background-size: cover;
    background-position: center;
}

.slide.active {
    opacity: 1;
}

/* DARK OVERLAY */
.slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

/* TEXT */
.slide-content {
    position: relative;
    z-index: 2;
    max-width: 800px;
}

.category {
    font-size: 14px;
    letter-spacing: 2px;
    color: #aaa;
    margin-bottom: 15px;
    display: block;
}

h2 {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 25px;
}

.view-more {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 2px;
    border-bottom: 1px solid #fff;
    padding-bottom: 5px;
    color: #fff;
    text-decoration: none;
}

/* =========================
   UI (compact horizontal)
========================= */
.slide-ui {
    position: absolute;
    bottom: 50px;
    right: 10%;

    display: flex;
    flex-direction: row;
    gap: 20px;

    z-index: 10;
}

/* item */
.ui-item {
    display: flex;
    flex-direction: column; /* 숫자 위 */
    align-items: flex-start;
    gap: 6px;
}

/* number */
.ui-num {
    font-size: 12px;
    letter-spacing: 2px;
    color: #fff;
    opacity: 0.85;
}

/* bar (짧게) */
.ui-bar {
    width: 80px;  /* 🔥 핵심: 짧게 */
    height: 2px;
    background: rgba(255,255,255,0.25);
    overflow: hidden;
}

/* fill */
.ui-fill {
    width: 100%;
    height: 100%;
    background: #fff;
    transform: translateX(-100%);
}

/* active animation */
.ui-fill.active {
    animation: fillMove 5s linear forwards;
}

/* completed */
.ui-fill.done {
    transform: translateX(0%);
}

/* animation */
@keyframes fillMove {
    from { transform: translateX(-100%); }
    to { transform: translateX(0%); }
}

/* =========================
   FOOTER
========================= */
#footer-container {
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header-container"></div>

<!-- MAIN -->
<main class="main-visual">

    <div class="slide-container">

        <!-- SLIDE 1 -->
        <div class="slide active"
             style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');">

            <div class="slide-content">
                <span class="category">Seoul, Seo-oh</span>
                <h2>서오그룹<br>신사옥</h2>
                <a class="view-more" href="projects/00001.html">View Project</a>
            </div>
        </div>

        <!-- SLIDE 2 -->
        <div class="slide"
             style="background-image:url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1920&q=80');">

            <div class="slide-content">
                <span class="category">Seoul, Seo-oh</span>
                <h2>e편한세상<br>서오 포레스타</h2>
                <a class="view-more" href="projects/00004.html">View Project</a>
            </div>
        </div>

        <!-- SLIDE 3 -->
        <div class="slide"
             style="background-image:url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1920&q=80');">

            <div class="slide-content">
                <span class="category">Seoul, Seogwang</span>
                <h2>서오출판사<br>신사옥</h2>
                <a class="view-more" href="projects/00005.html">View Project</a>
            </div>
        </div>

    </div>

    <!-- UI -->
    <div class="slide-ui">

        <div class="ui-item">
            <span class="ui-num">01</span>
            <div class="ui-bar"><div class="ui-fill"></div></div>
        </div>

        <div class="ui-item">
            <span class="ui-num">02</span>
            <div class="ui-bar"><div class="ui-fill"></div></div>
        </div>

        <div class="ui-item">
            <span class="ui-num">03</span>
            <div class="ui-bar"><div class="ui-fill"></div></div>
        </div>

    </div>

</main>

<!-- FOOTER -->
<div id="footer-container"></div>

<script>

/* HEADER / FOOTER LOAD */
function loadComponent(id, file) {
    fetch(file)
        .then(res => res.text())
        .then(data => document.getElementById(id).innerHTML = data);
}

window.addEventListener('DOMContentLoaded', () => {
    loadComponent('header-container', 'header.html');
    loadComponent('footer-container', 'footer.html');
});

/* SLIDER LOGIC */
let currentIdx = 0;
const slides = document.querySelectorAll('.slide');
const fills = document.querySelectorAll('.ui-fill');
const total = slides.length;

/* bars update */
function updateBars(index) {

    fills.forEach((fill, i) => {

        if (i < index) {
            fill.classList.remove('active');
            fill.classList.add('done');
        } else if (i === index) {
            fill.classList.remove('done');
            void fill.offsetWidth;
            fill.classList.add('active');
        } else {
            fill.classList.remove('active', 'done');
        }

    });
}

/* show slide */
function showSlide(index) {

    slides.forEach(s => s.classList.remove('active'));
    slides[index].classList.add('active');

    currentIdx = index;

    updateBars(index);
}

/* next */
function nextSlide() {
    showSlide((currentIdx + 1) % total);
}

/* manual control */
function currentSlide(index) {
    showSlide(index);
    clearInterval(slideInterval);
    slideInterval = setInterval(nextSlide, 8000);
}

/* init */
showSlide(0);
let slideInterval = setInterval(nextSlide, 8000);

</script>

</body>
</html>

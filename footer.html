<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Component</title>

    <style>
        /* ===== 푸터 전체 ===== */
        .site-footer {
            background-color: #111111;
            width: 100%;
            padding: 40px 10%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border-top: 1px solid #1a1a1a;
        }

        /* ===== 기본 텍스트 스타일 ===== */
        .site-footer .copyright {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: #888888; /* 전체 통일 회색 */
            letter-spacing: 0.5px;
            text-align: left;
            margin: 0;
            line-height: 1.5;
        }

        /* 회사명 (강조 최소화) */
        .site-footer .company-name {
            font-weight: 600;
            color: #888888; /* 동일 색상 유지 */
        }

        /* 모바일 */
        @media (max-width: 768px) {
            .site-footer {
                padding: 30px 5%;
            }

            .site-footer .copyright {
                font-size: 11px;
            }
        }
    </style>
</head>

<body>

    <footer class="site-footer">
        <p class="copyright">
            <span class="company-name">SEO Architecture</span> &copy; 2026. All Rights Reserved.
        </p>
    </footer>

</body>
</html>

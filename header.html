<style>

/* ===== 커스텀 폰트 ===== */
@font-face{
    font-family:'GwangjuFont';
    src:url('빛고을광주_Medium.ttf') format('truetype');
    font-weight:normal;
    font-style:normal;
}

/* ===== 헤더 ===== */
.site-header,
.site-header *{
    box-sizing:border-box;
    font-family:'GwangjuFont', sans-serif;
}

.site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:12px 6%;

    z-index:99999;

    background:transparent;

    transition:
        background 0.35s ease,
        box-shadow 0.35s ease,
        padding 0.35s ease,
        backdrop-filter 0.35s ease;
}

/* ===== 스크롤 ===== */
.site-header.scrolled{
    background:#ffffff;
    backdrop-filter:blur(12px);

    box-shadow:
        0 2px 15px rgba(0,0,0,0.08);

    padding:8px 6%;
}

/* ===== 로고 ===== */
.header-logo{
    display:flex;
    align-items:center;
}

.header-logo a{
    display:inline-block;
    text-decoration:none;
}

.header-logo img{
    height:58px;
    width:auto;
    display:block;

    transition:
        height 0.3s ease,
        opacity 0.3s ease;
}

.site-header.scrolled .header-logo img{
    height:52px;
}

/* ===== 메뉴 ===== */
.header-nav{
    display:flex;
    align-items:center;
}

.header-nav ul{
    display:flex;
    align-items:center;

    gap:38px;

    list-style:none;

    margin:0;
    padding:0;
}

.header-nav a{
    position:relative;

    color:#ffffff;

    text-decoration:none;
    text-transform:uppercase;

    font-size:13px;
    font-weight:500;

    letter-spacing:1.5px;

    padding-bottom:4px;

    transition:
        color 0.3s ease,
        opacity 0.3s ease;
}

/* 스크롤 시 */
.site-header.scrolled .header-nav a{
    color:#000000;
}

/* hover */
.header-nav a:hover{
    opacity:0.7;
}

/* underline */
.header-nav a::after{
    content:'';

    position:absolute;
    left:0;
    bottom:0;

    width:0;
    height:1.5px;

    background:#ffffff;

    transition:
        width 0.3s ease,
        background 0.3s ease;
}

.site-header.scrolled .header-nav a::after{
    background:#000000;
}

.header-nav a:hover::after{
    width:100%;
}

/* ===== 모바일 ===== */
@media (max-width:768px){

    .site-header{
        flex-direction:column;
        gap:12px;

        padding:10px 5%;
    }

    .site-header.scrolled{
        padding:8px 5%;
    }

    .header-logo{
        width:100%;
        justify-content:center;
    }

    .header-logo img{
        height:46px;
    }

    .site-header.scrolled .header-logo img{
        height:42px;
    }

    .header-nav{
        width:100%;
        justify-content:center;
    }

    .header-nav ul{
        gap:18px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .header-nav a{
        font-size:11px;
        letter-spacing:1px;
    }

}

</style>

<header class="site-header" id="siteHeader">

    <!-- 로고 -->
    <div class="header-logo">

        <a href="index.html">

            <img
                id="headerLogo"
                src="seoarchilogow.png"
                alt="SEO Architecture Logo">

        </a>

    </div>

    <!-- 메뉴 -->
    <nav class="header-nav">

        <ul>

            <li><a href="SERVICE.html">Service</a></li>
            <li><a href="PROJECT.html">Project</a></li>
            <li><a href="ABOUT.html">About</a></li>
            <li><a href="CONTACT US.html">Contact</a></li>

        </ul>

    </nav>

</header>

<script>

/* =========================
   HEADER LOGIC
========================= */

(function(){

    const header = document.getElementById('siteHeader');
    const logo = document.getElementById('headerLogo');

    function updateHeader(){

        if(window.scrollY > 10){

            header.classList.add('scrolled');

            /* 흰배경 로고 */
            logo.src = 'seoarchilogo.png';

        }else{

            header.classList.remove('scrolled');

            /* 투명배경 로고 */
            logo.src = 'seoarchilogow.png';

        }

    }

    updateHeader();

    window.addEventListener('scroll', updateHeader);

})();

</script>

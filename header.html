<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header Component</title>

<style>

/* ===== 커스텀 폰트 ===== */
@font-face {
    font-family: 'GwangjuFont';
    src: url('빛고을광주_Medium.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

/* ===== 전체 설정 ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'GwangjuFont', sans-serif;
}

body{
    margin:0;
}

/* ===== 헤더 ===== */
.site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:10px 6%;
    z-index:9999;

    background:transparent;
    transition:
        background-color 0.35s ease,
        box-shadow 0.35s ease,
        padding 0.35s ease;
}

/* ===== 스크롤 시 ===== */
.site-header.scrolled{
    background:#ffffff;
    box-shadow:0 2px 15px rgba(0,0,0,0.08);
    padding:8px 6%;
}

/* ===== 로고 ===== */
.header-logo{
    display:flex;
    align-items:center;
}

.header-logo a{
    display:inline-block;
    text-decoration:none;
}

.header-logo img{
    height:58px;
    width:auto;
    display:block;
    transition:height 0.3s ease;
}

/* 스크롤 시 로고 조금 축소 */
.site-header.scrolled .header-logo img{
    height:52px;
}

/* ===== 메뉴 ===== */
.header-nav{
    display:flex;
    align-items:center;
}

.header-nav ul{
    display:flex;
    list-style:none;
    gap:38px;
}

/* ===== 메뉴 링크 ===== */
.header-nav a{
    font-size:13px;
    font-weight:500;
    letter-spacing:1.5px;

    color:#ffffff;
    text-decoration:none;
    text-transform:uppercase;

    position:relative;
    padding-bottom:5px;

    transition:all 0.3s ease;
}

/* 스크롤 시 글자 검정 */
.site-header.scrolled .header-nav a{
    color:#000000;
}

/* ===== 호버 ===== */
.header-nav a::after{
    content:'';
    position:absolute;
    left:0;
    bottom:0;

    width:0;
    height:1.5px;

    background:#002c5f;
    transition:width 0.3s ease;
}

.header-nav a:hover::after{
    width:100%;
}

/* ===== 모바일 ===== */
@media (max-width:768px){

    .site-header{
        padding:10px 5%;
    }

    .site-header.scrolled{
        padding:8px 5%;
    }

    .header-logo img{
        height:50px;
    }

    .site-header.scrolled .header-logo img{
        height:46px;
    }

    .header-nav ul{
        gap:18px;
    }

    .header-nav a{
        font-size:11px;
        letter-spacing:1px;
    }
}

</style>
</head>

<body>

<header class="site-header" id="siteHeader">

    <!-- 로고 -->
    <div class="header-logo">
        <a href="index.html">
            <img src="seoarchilogo.png" alt="SEO Architecture Logo">
        </a>
    </div>

    <!-- 메뉴 -->
    <nav class="header-nav">
        <ul>
            <li><a href="SERVICE.html">Service</a></li>
            <li><a href="PROJECT.html">Project</a></li>
            <li><a href="ABOUT.html">About</a></li>
            <li><a href="CONTACT US.html">Contact</a></li>
        </ul>
    </nav>

</header>

<script>

/* ===== 스크롤 시 헤더 변경 ===== */
const header = document.getElementById('siteHeader');

window.addEventListener('scroll', () => {

    if(window.scrollY > 50){
        header.classList.add('scrolled');
    }else{
        header.classList.remove('scrolled');
    }

});

</script>

</body>
</html>

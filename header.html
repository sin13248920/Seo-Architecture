<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Component</title>
    <style>
        /* 헤더 전체 컨테이너 (흰색 배경에 하단 연한 회색 테두리로 구분) */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 10%;
            background-color: #ffffff; /* 흰색 배경 */
            width: 100%;
            border-bottom: 1px solid #eeeeee; /* 정갈한 일자 구분선 */
            transition: all 0.3s ease;
        }

        /* 로고 영역 (검은색 글씨) */
        .header-logo {
            display: flex;
            align-items: center;
        }
        
        .header-logo a {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #000000; /* 검정 글씨 */
            text-decoration: none;
            text-transform: uppercase;
            display: inline-block;
        }

        /* 네비게이션 메뉴 목록 */
        .header-nav ul {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 40px;
        }

        /* 메뉴 개별 링크 스타일 (검은색 글씨) */
        .header-nav a {
            font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #000000; /* 검정 글씨 */
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 6px;
            transition: color 0.3s ease;
        }

        /* 마우스 호버 시 텍스트 색상 (진한 회색으로 부드럽게 변경) */
        .header-nav a:hover {
            color: #555555;
        }

        /* 메뉴 호버 애니메이션 (세련된 검은색 하단 밑줄 효과) */
        .header-nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background-color: #000000; /* 검은색 밑줄 */
            transition: width 0.3s ease;
        }

        .header-nav a:hover::after {
            width: 100%;
        }

        /* 모바일 및 태블릿 반응형 레이아웃 대응 */
        @media (max-width: 768px) {
            .site-header {
                padding: 20px 5%;
            }
            .header-nav ul {
                gap: 20px;
            }
            .header-nav a {
                font-size: 12px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <!-- 1. 로고 영역 (링크들어갈 곳 비워둠) -->
        <div class="header-logo">
            <a href="index.html"><!-- 링크들어갈 곳 -->LOGO</a>
        </div>

        <!-- 2. 메인 메뉴 영역 (흰색 배경에 검은 글씨) -->
        <nav class="header-nav">
            <ul>
                <li><a href="SERVICE.html">Service</a></li>
                <li><a href="PROJECT.html">Project</a></li>
                <li><a href="ABOUT.html">About</a></li>
                <li><a href="CONTACT US.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
